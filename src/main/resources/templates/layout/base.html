<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:include=":: #tituloPagina">FELICITA</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- CSS Personalizado -->
    <link th:href="@{/css/estilos.css}" rel="stylesheet">
    
    <!-- Estilos adicionales específicos -->
    <th:block th:replace=":: #estilosAdicionales"></th:block>
</head>
<body>
    <!-- Cabecera -->
    <div th:replace="fragments/header :: cabecera"></div>
    
    <!-- Contenido de la Página -->
    <main>
        <div th:replace=":: #contenidoPagina"></div>
    </main>
    
    <!-- Pie de Página -->
    <div th:replace="fragments/footer :: piePagina"></div>
    
    <!-- Scripts Bootstrap y jQuery -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    
    <!-- Script personalizado global -->
    <script th:src="@{/js/main.js}"></script>
    
    <!-- Scripts adicionales específicos -->
    <th:block th:replace=":: #scriptsAdicionales"></th:block>
</body>
</html>
